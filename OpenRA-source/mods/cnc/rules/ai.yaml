	# BEGIN ReCnC UI-001 — Specialist (Turtle) bot: defensive build, heavy on static defenses
	# Cloned from Hard (HAL9001) base; defense fractions doubled, building limits raised, squad
	# size reduced further so the AI commits more economy/power to walls and turrets.
	BaseBuilderBotModule@specialist:
		RequiresCondition: enable-specialist-ai
		BuildingQueues: Building.Nod, Building.GDI

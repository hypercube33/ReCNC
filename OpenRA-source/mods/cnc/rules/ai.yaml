Player:
	# BEGIN ReCnC UI-001 — rename TD AI bots to standardized difficulty names
	# Was: Cabal, Watson, HAL9001 (sci-fi pop-culture references). Mapping:
	#   Watson  -> Easy       (balanced production, predictable squad sizes)
	#   Cabal   -> Medium     (larger squads, artillery-heavy, no helipads)
	#   HAL9001 -> Hard       (smaller focused squads, highest building limits, infantry-heavy)
	#   (new)   -> Specialist (Turtle - clone of Hard with bias toward defensive structures)
	ModularBot@Easy:
		Name: bot-easy.name
		Type: easy
	ModularBot@Medium:
		Name: bot-medium.name
		Type: medium
	ModularBot@Hard:
		Name: bot-hard.name
		Type: hard
	ModularBot@Specialist:
		Name: bot-specialist.name
		Type: specialist
	GrantConditionOnBotOwner@easy:
		Condition: enable-easy-ai
		Bots: easy
	GrantConditionOnBotOwner@medium:
		Condition: enable-medium-ai
		Bots: medium
	GrantConditionOnBotOwner@hard:
		Condition: enable-hard-ai
		Bots: hard
	GrantConditionOnBotOwner@specialist:
		Condition: enable-specialist-ai
		Bots: specialist
	# END ReCnC UI-001
	SupportPowerBotModule:
		RequiresCondition: enable-easy-ai || enable-medium-ai || enable-hard-ai || enable-specialist-ai
		Decisions:
			Airstrike:
				OrderName: AirstrikePowerInfoOrder
				MinimumAttractiveness: 2000
				Consideration@1:
					Against: Enemy
					Types: Vehicle, Infantry
					Attractiveness: 3
					TargetMetric: Value
					CheckRadius: 2c0
				Consideration@2:
					Against: Ally
					Types: Ground, Water
					Attractiveness: -20
					TargetMetric: Value
					CheckRadius: 2c0
				Consideration@3:
					Against: Enemy
					Types: Structure
					Attractiveness: 1
					TargetMetric: Value
					CheckRadius: 2c0
			IonCannonPower:
				OrderName: IonCannonPowerInfoOrder
				MinimumAttractiveness: 1000
				FineScanRadius: 2
				Consideration@1:
					Against: Enemy
					Types: Air, Tank, Vehicle, Infantry, Water
					Attractiveness: 2
					TargetMetric: Value
					CheckRadius: 2c0
				Consideration@2:
					Against: Enemy
					Types: Structure
					Attractiveness: 1
					TargetMetric: Value
					CheckRadius: 2c0
				Consideration@3:
					Against: Ally
					Types: Ground, Water
					Attractiveness: -10
					TargetMetric: Value
					CheckRadius: 3c0
			NukePower:
				OrderName: NukePowerInfoOrder
				MinimumAttractiveness: 3000
				Consideration@1:
					Against: Enemy
					Types: Structure
					Attractiveness: 1
					TargetMetric: Value
					CheckRadius: 5c0
				Consideration@2:
					Against: Ally
					Types: Air, Ground, Water
					Attractiveness: -10
					TargetMetric: Value
					CheckRadius: 7c0
